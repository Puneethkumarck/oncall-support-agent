services:
  # =============================================================================
  # Mock ArgoCD API (WireMock on port 8100)
  # Simulates ArgoCD REST API for deploy history, revision metadata, rollback
  # =============================================================================
  mock-argocd:
    image: wiremock/wiremock:3.13.0
    ports:
      - "8100:8080"
    volumes:
      - ./wiremock/mappings/argocd-get-application.json:/home/wiremock/mappings/argocd-get-application.json:ro
      - ./wiremock/mappings/argocd-get-revision-metadata.json:/home/wiremock/mappings/argocd-get-revision-metadata.json:ro
    command: ["--global-response-templating"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # =============================================================================
  # Mock PagerDuty API (WireMock on port 8101)
  # Simulates PagerDuty incidents, log entries, notes
  # =============================================================================
  mock-pagerduty:
    image: wiremock/wiremock:3.13.0
    ports:
      - "8101:8080"
    volumes:
      - ./wiremock/mappings/pagerduty-get-incident.json:/home/wiremock/mappings/pagerduty-get-incident.json:ro
      - ./wiremock/mappings/pagerduty-list-incidents.json:/home/wiremock/mappings/pagerduty-list-incidents.json:ro
      - ./wiremock/mappings/pagerduty-list-incidents-by-team.json:/home/wiremock/mappings/pagerduty-list-incidents-by-team.json:ro
      - ./wiremock/mappings/pagerduty-incident-log-entries.json:/home/wiremock/mappings/pagerduty-incident-log-entries.json:ro
      - ./wiremock/mappings/pagerduty-add-note.json:/home/wiremock/mappings/pagerduty-add-note.json:ro
    command: ["--global-response-templating"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # =============================================================================
  # Mock Slack Webhook (WireMock on port 8102)
  # Receives webhook POSTs and returns 200 "ok"
  # =============================================================================
  mock-slack:
    image: wiremock/wiremock:3.13.0
    ports:
      - "8102:8080"
    volumes:
      - ./wiremock/mappings/slack-webhook.json:/home/wiremock/mappings/slack-webhook.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
